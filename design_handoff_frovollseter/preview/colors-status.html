<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  body { margin: 0; font-family: system-ui, sans-serif; background: #fff; padding: 16px; box-sizing: border-box; }
  .title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .row { display: flex; gap: 10px; }
  .card { flex: 1; border-radius: 8px; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; border-radius: 9999px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
  .var { font-size: 9px; font-family: monospace; margin-top: 2px; }
  .label { font-size: 10px; font-weight: 600; }
</style></head>
<body>
  <div class="title">Road Status Colors</div>
  <div class="row">
    <div class="card" style="background:hsl(142 76% 36% / .1)">
      <div class="badge" style="background:#dcfce7; color:#166534;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg> Nettopp brøytet</div>
      <div class="badge" style="background:#dcfce7; color:#166534;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Sommerdekk OK</div>
      <div class="label" style="color:hsl(142 76% 36%)">Safe</div>
      <div class="var" style="color:#555">hsl(142 76% 36%)</div>
    </div>
    <div class="card" style="background:hsl(38 92% 50% / .1)">
      <div class="badge" style="background:#fef3c7; color:#92400e;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#92400e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> 4WD anbefalt</div>
      <div class="label" style="color:hsl(38 92% 40%)">Caution</div>
      <div class="var" style="color:#555">hsl(38 92% 50%)</div>
    </div>
    <div class="card" style="background:hsl(0 84% 60% / .1)">
      <div class="badge" style="background:#fee2e2; color:#991b1b;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#991b1b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg> Flomskade</div>
      <div class="badge" style="background:#fee2e2; color:#991b1b;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#991b1b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Farlig</div>
      <div class="label" style="color:hsl(0 84% 50%)">Danger</div>
      <div class="var" style="color:#555">hsl(0 84% 60%)</div>
    </div>
    <div class="card" style="background:hsl(215 16% 47% / .1)">
      <div class="badge" style="background:#f3f4f6; color:#4b5563;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Stengt</div>
      <div class="label" style="color:hsl(215 16% 47%)">Closed</div>
      <div class="var" style="color:#555">hsl(215 16% 47%)</div>
    </div>
  </div>
</body>
</html>
