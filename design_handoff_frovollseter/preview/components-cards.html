<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; padding: 14px; box-sizing: border-box; }
  .row { display: flex; gap: 10px; }
  .card { background: #fff; border: 1px solid hsl(214.3 31.8% 91.4%); border-radius: 8px; flex: 1; overflow: hidden; }
  .card-header { padding: 12px 14px 8px; }
  .card-content { padding: 0 14px 12px; }
  .card-title { font-size: 14px; font-weight: 600; color: hsl(222.2 84% 4.9%); margin: 0 0 4px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; border-radius: 9999px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .b-safe { background: #dcfce7; color: #166534; }
  .b-outline { border: 1px solid hsl(214.3 31.8% 91.4%); color: hsl(222.2 84% 4.9%); }
  .b-secondary { background: hsl(210 40% 96.1%); color: hsl(222.2 47.4% 11.2%); }
  .meta { font-size: 11px; color: #9ca3af; }
  .body-text { font-size: 13px; color: #6b7280; line-height: 1.5; }
  .stale { opacity: 0.6; }
  .border-primary { border-color: hsl(213 72% 30% / .3); }
</style></head>
<body>
  <div class="row">
    <!-- Road report card -->
    <div class="card">
      <div class="card-header">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="display:flex;gap:8px;align-items:center">
            <div style="width:36px;height:36px;border-radius:8px;background:#f0fdf4;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            </div>
            <div>
              <div style="display:flex;gap:4px;align-items:center">
                <span class="badge b-safe">Nettopp brøytet</span>
              </div>
              <p style="font-size:12px;font-weight:500;margin:3px 0 0;color:#111827">Fra bommen til første sving</p>
            </div>
          </div>
          <span class="meta">for 1 time siden</span>
        </div>
      </div>
      <div class="card-content">
        <p class="body-text">Helt fritt fremkommeleg, godt brøyta.</p>
      </div>
      <div style="padding:0 14px 10px"><span class="meta">Rapportert av Håvard</span></div>
    </div>
    <!-- Stale card -->
    <div class="card stale">
      <div class="card-header">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="display:flex;gap:8px;align-items:center">
            <div style="width:36px;height:36px;border-radius:8px;background:#f0fdf4;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0.6">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <div>
              <div style="display:flex;gap:4px">
                <span class="badge b-safe">Sommerdekk OK</span>
                <span class="badge b-outline" style="font-size:10px">Utdatert</span>
              </div>
            </div>
          </div>
          <span class="meta">for 3 dager siden</span>
        </div>
      </div>
    </div>
    <!-- News card -->
    <div class="card">
      <div class="card-header">
        <p class="card-title">Dugnadsarbeid lørdag 3. mai</p>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="badge b-secondary">Veglag</span>
          <span class="meta">for 2 dager siden</span>
        </div>
      </div>
      <div class="card-content">
        <p class="body-text">Vi møtes kl. 10 ved bommen for å rydde veikanten.</p>
      </div>
    </div>
  </div>
</body>
</html>
