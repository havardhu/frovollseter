<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; padding: 0; box-sizing: border-box; }
  header { background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid hsl(214.3 31.8% 91.4%); position: sticky; top: 0; }
  .inner { max-width: 700px; margin: 0 auto; padding: 0 16px; height: 56px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .logo { font-size: 16px; font-weight: 700; color: hsl(222.2 84% 4.9%); display: flex; align-items: center; gap: 6px; text-decoration: none; }
  nav { display: flex; gap: 4px; }
  .nav-link { padding: 6px 12px; border-radius: 6px; font-size: 14px; color: #6b7280; text-decoration: none; transition: background .15s; display: inline-flex; align-items: center; justify-content: center; text-align: center; }
  .nav-link:hover { background: hsl(210 40% 96.1%); color: hsl(222.2 84% 4.9%); }
  .nav-link.active { background: hsl(213 72% 30% / .1); color: hsl(213 72% 30%); font-weight: 500; }
  .actions { display: flex; gap: 4px; align-items: center; }
  .btn-ghost-icon { width: 36px; height: 36px; border: none; background: transparent; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #6b7280; }
  .btn-ghost-icon:hover { background: hsl(210 40% 96.1%); }
  .btn-login { background: hsl(213 72% 30%); color: #f5f8ff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; }
  svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  footer { border-top: 1px solid hsl(214.3 31.8% 91.4%); padding: 14px; text-align: center; font-size: 12px; color: #9ca3af; margin-top: 60px; }
</style></head>
<body>
  <header>
    <div class="inner">
      <a class="logo" href="#">🏔️ Frovollseter</a>
      <nav>
        <a class="nav-link active" href="#">Veiforhold</a>
        <a class="nav-link" href="#">Nyheter</a>
        <a class="nav-link" href="#">Webkameraer</a>
        <a class="nav-link" href="#">Nyttige lenker</a>
      </nav>
      <div class="actions">
        <button class="btn-ghost-icon">
          <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="btn-login">Logg inn</button>
      </div>
    </div>
  </header>
  <footer>Frovollseter · Non-profit veglag og hytteeierlag</footer>
</body>
</html>
