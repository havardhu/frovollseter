<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #fff; padding: 16px; box-sizing: border-box; }
  .title { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
  .badge { display: inline-flex; align-items: center; gap: 4px; border-radius: 9999px; padding: 3px 10px; font-size: 12px; font-weight: 600; border: 1px solid transparent; }
  .b-default { background: hsl(213 72% 30%); color: #f5f8ff; }
  .b-secondary { background: hsl(210 40% 96.1%); color: hsl(222.2 47.4% 11.2%); }
  .b-outline { background: transparent; color: hsl(222.2 84% 4.9%); border-color: hsl(214.3 31.8% 91.4%); }
  .b-destructive { background: hsl(0 84.2% 60.2%); color: #fff; }
  .b-safe { background: #dcfce7; color: #166534; }
  .b-caution { background: #fef3c7; color: #92400e; }
  .b-danger { background: #fee2e2; color: #991b1b; }
  .b-closed { background: #f3f4f6; color: #4b5563; }
</style></head>
<body>
  <div class="title">UI Badges</div>
  <div class="row">
    <span class="badge b-default">Default</span>
    <span class="badge b-secondary">Secondary</span>
    <span class="badge b-outline">Outline</span>
    <span class="badge b-destructive">Destructive</span>
  </div>
  <div class="title" style="margin-top:8px">Road Status Badges</div>
  <div class="row">
    <span class="badge b-safe"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg> Nettopp brøytet</span>
    <span class="badge b-safe"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Sommerdekk OK</span>
    <span class="badge b-caution"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#92400e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> 4WD anbefalt</span>
    <span class="badge b-danger"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#991b1b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg> Flomskade</span>
    <span class="badge b-danger"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#991b1b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Farlig</span>
    <span class="badge b-closed"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Stengt</span>
    <span class="badge b-outline"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Ukjent</span>
    <span class="badge b-outline" style="font-size:10px">Utdatert</span>
  </div>
</body>
</html>
