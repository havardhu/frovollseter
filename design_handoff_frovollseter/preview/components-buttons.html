<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #fff; padding: 16px; box-sizing: border-box; }
  .title { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .label { font-size: 10px; color: #9ca3af; margin-top: 4px; text-align: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  button { font-family: 'Inter', system-ui, sans-serif; cursor: pointer; font-size: 14px; font-weight: 500; border-radius: 6px; border: none; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn-default { background: hsl(213 72% 30%); color: #f5f8ff; padding: 8px 16px; }
  .btn-secondary { background: hsl(210 40% 96.1%); color: hsl(222.2 47.4% 11.2%); padding: 8px 16px; }
  .btn-outline { background: transparent; color: hsl(222.2 84% 4.9%); padding: 8px 16px; border: 1px solid hsl(214.3 31.8% 91.4%); }
  .btn-ghost { background: transparent; color: hsl(222.2 84% 4.9%); padding: 8px 16px; }
  .btn-destructive { background: hsl(0 84.2% 60.2%); color: #fff; padding: 8px 16px; }
  .btn-sm { font-size: 13px; padding: 6px 12px; border-radius: 6px; }
  .btn-lg { font-size: 15px; padding: 10px 24px; border-radius: 6px; }
  .btn-icon { width: 40px; height: 40px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; }
  .btn-disabled { opacity: 0.5; }
  svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style></head>
<body>
  <div class="row">
    <div class="col">
      <button class="btn-default">Rapporter</button>
      <span class="label">default</span>
    </div>
    <div class="col">
      <button class="btn-secondary">Sekundær</button>
      <span class="label">secondary</span>
    </div>
    <div class="col">
      <button class="btn-outline">Avbryt</button>
      <span class="label">outline</span>
    </div>
    <div class="col">
      <button class="btn-ghost">Logg ut</button>
      <span class="label">ghost</span>
    </div>
    <div class="col">
      <button class="btn-destructive">Slett</button>
      <span class="label">destructive</span>
    </div>
    <div class="col">
      <button class="btn-default btn-disabled" disabled>Sender…</button>
      <span class="label">disabled</span>
    </div>
  </div>
  <div class="row">
    <div class="col">
      <button class="btn-default btn-sm">Logg inn</button>
      <span class="label">sm</span>
    </div>
    <div class="col">
      <button class="btn-default">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Rapporter
      </button>
      <span class="label">with icon</span>
    </div>
    <div class="col">
      <button class="btn-outline btn-icon">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <span class="label">icon only</span>
    </div>
    <div class="col">
      <button class="btn-ghost btn-icon">
        <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <span class="label">ghost icon</span>
    </div>
  </div>
</body>
</html>
